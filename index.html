<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Wordle Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #538d4e;
    --yellow: #b59f3b;
    --gray: #3a3a3c;
    --bg: #121213;
    --surface: #1a1a1b;
    --surface2: #242424;
    --border: #2e2e30;
    --text: #ffffff;
    --text2: #818384;
    --text3: #565758;
    --accent: #538d4e;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 0 0 4rem;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  .logo {
    font-family: var(--mono);
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-tiles {
    display: flex;
    gap: 3px;
  }

  .logo-tile {
    width: 14px;
    height: 14px;
    border-radius: 2px;
  }

  .tile-g { background: var(--green); }
  .tile-y { background: var(--yellow); }
  .tile-x { background: var(--gray); }

  .header-right {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    text-align: right;
    line-height: 1.5;
  }

  .main { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem 0; }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2rem;
  }

  .tab {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    padding: 10px 18px;
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
  }

  .tab.active { color: var(--green); border-bottom-color: var(--green); }
  .tab:hover:not(.active) { color: var(--text2); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Month nav */
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .month-label {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text);
  }

  .month-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: var(--mono);
    font-size: 14px;
    width: 32px;
    height: 32px;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s, color 0.1s;
  }

  .month-btn:hover { background: var(--border); color: var(--text); }

  /* Leaderboard */
  .leaderboard { display: flex; flex-direction: column; gap: 8px; margin-bottom: 2rem; }

  .player-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 28px 1fr 80px 80px 80px;
    align-items: center;
    gap: 8px;
    transition: border-color 0.15s;
  }

  .player-row:hover { border-color: var(--text3); }
  .player-row.leader { border-color: var(--green); }

  .rank {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text3);
    text-align: center;
  }

  .rank.gold { color: #f5c518; }

  .player-name {
    font-weight: 600;
    font-size: 15px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .crown { font-size: 14px; }

  .stat-col {
    text-align: right;
  }

  .stat-val {
    font-family: var(--mono);
    font-size: 15px;
    color: var(--text);
  }

  .stat-val.good { color: var(--green); }

  .stat-label {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* Score bar */
  .score-bar-wrap { margin-top: 6px; grid-column: 2 / -1; }
  .score-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .score-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--green);
    transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* Submit form */
  .submit-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 2rem;
  }

  .submit-title {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 1.25rem;
  }

  .form-row { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }

  .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 130px; }

  label {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-family: var(--mono);
  }

  select, textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
  }

  select:focus, textarea:focus { border-color: var(--green); }

  textarea {
    resize: vertical;
    min-height: 90px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.6;
  }

  .submit-btn {
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 10px 24px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }

  .submit-btn:hover { opacity: 0.88; }
  .submit-btn:active { transform: scale(0.98); }

  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--green);
    color: #fff;
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 6px;
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* History */
  .history-filters {
    display: flex;
    gap: 8px;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.1s;
  }

  .filter-btn.active { background: var(--surface2); border-color: var(--text3); color: var(--text); }

  .history-list { display: flex; flex-direction: column; gap: 6px; }

  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .history-meta { display: flex; align-items: center; gap: 10px; }
  .history-player { font-weight: 600; font-size: 14px; }
  .history-date { font-family: var(--mono); font-size: 11px; color: var(--text3); }
  .history-wordle { font-family: var(--mono); font-size: 11px; color: var(--text2); }

  .history-score {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 700;
  }

  .score-1, .score-2 { color: var(--green); }
  .score-3, .score-4 { color: #8bc34a; }
  .score-5 { color: var(--yellow); }
  .score-6 { color: #e67e22; }
  .score-X { color: #e74c3c; }

  .delete-btn {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 4px;
    border-radius: 3px;
    transition: color 0.1s, background 0.1s;
  }
  .delete-btn:hover { color: #e74c3c; background: rgba(231,76,60,0.1); }

  /* Points / grand prize */
  .prize-banner {
    background: linear-gradient(135deg, #1a2e1a 0%, #1a1a1b 100%);
    border: 1px solid var(--green);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .prize-left { }
  .prize-title { font-family: var(--mono); font-size: 11px; color: var(--green); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  .prize-amount { font-size: 24px; font-weight: 700; }
  .prize-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

  .points-grid { display: flex; gap: 12px; flex-wrap: wrap; }

  .points-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
    text-align: center;
  }

  .points-chip .p-name { font-size: 12px; color: var(--text2); margin-bottom: 2px; }
  .points-chip .p-pts {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }
  .points-chip .p-pts.leading { color: var(--green); }

  /* Responsive */
  @media (max-width: 500px) {
    .player-row { grid-template-columns: 24px 1fr 60px 60px 60px; gap: 4px; }
    .stat-val { font-size: 13px; }
    .score-bar-wrap { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-tiles">
      <div class="logo-tile tile-x"></div>
      <div class="logo-tile tile-g"></div>
      <div class="logo-tile tile-y"></div>
      <div class="logo-tile tile-g"></div>
      <div class="logo-tile tile-g"></div>
    </div>
    FAMILY WORDLE
  </div>
  <div class="header-right" id="header-date"></div>
</header>

<div class="main">

  <div class="tabs">
    <button class="tab active" onclick="switchTab('leaderboard')">LEADERBOARD</button>
    <button class="tab" onclick="switchTab('submit')">SUBMIT SCORE</button>
    <button class="tab" onclick="switchTab('history')">HISTORY</button>
  </div>

  <!-- LEADERBOARD -->
  <div id="tab-leaderboard" class="tab-content active">

    <div class="prize-banner">
      <div class="prize-left">
        <div class="prize-title">Grand Prize</div>
        <div class="prize-amount" id="prize-amount">$100</div>
        <div class="prize-sub">Lowest avg score wins each month · most points by Dec wins all</div>
      </div>
      <div class="points-grid" id="points-grid"></div>
    </div>

    <div class="month-nav">
      <button class="month-btn" onclick="changeMonth(-1)">&#8592;</button>
      <div class="month-label" id="month-label"></div>
      <button class="month-btn" onclick="changeMonth(1)">&#8594;</button>
    </div>

    <div class="leaderboard" id="leaderboard"></div>

  </div>

  <!-- SUBMIT -->
  <div id="tab-submit" class="tab-content">
    <div class="submit-card">
      <div class="submit-title">Post Your Score</div>
      <div class="form-row">
        <div class="form-group">
          <label>Your Name</label>
          <select id="submit-player">
            <option value="">Select...</option>
            <option>Jeff</option><option>Tristan</option><option>Nana</option><option>Daniel</option><option>Caleb</option>
          </select>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label>Paste Your Wordle Result</label>
        <textarea id="submit-text" placeholder="Wordle 1,747 4/6&#10;⬜⬜⬜⬜⬜&#10;🟩⬜⬜⬜⬜&#10;🟩⬜⬜⬜🟩&#10;🟩🟩🟩🟩🟩"></textarea>
      </div>
      <div id="parse-preview" style="margin-bottom:14px; font-family: var(--mono); font-size:13px; color: var(--green); min-height:20px;"></div>
      <button class="submit-btn" onclick="submitScore()">SUBMIT ↗</button>
    </div>
  </div>

  <!-- HISTORY -->
  <div id="tab-history" class="tab-content">
    <div class="history-filters" id="history-filters">
      <button class="filter-btn active" onclick="filterHistory('ALL', this)">ALL</button>
      <button class="filter-btn" onclick="filterHistory('Jeff', this)">J</button>
      <button class="filter-btn" onclick="filterHistory('Tristan', this)">T</button>
      <button class="filter-btn" onclick="filterHistory('Nana', this)">N</button>
      <button class="filter-btn" onclick="filterHistory('Daniel', this)">D</button>
      <button class="filter-btn" onclick="filterHistory('Caleb', this)">C</button>
    </div>
    <div class="history-list" id="history-list"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const SUPABASE_URL = "https://shwvzovanprmfesgaerr.supabase.co";
const SUPABASE_KEY = "sb_publishable_braVFdZ2cgC6WNSOszJbIg_g-TL_e5o";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allScores = [];
let scoresChannel = null;

const PLAYERS = ['Jeff','Tristan','Nana','Daniel','Caleb'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const FULL_MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

let currentMonth = new Date().getMonth();
let historyFilter = 'ALL';

// --- Storage ---
function loadData() {
  return allScores;
}

async function fetchScores() {
  const { data, error } = await supabase
    .from('scores')
    .select('*')
    .order('id', { ascending: false });

  if (!error) {
    allScores = data || [];
    renderAll();
  }
}

function subscribeToScores() {
  if (scoresChannel) return;

  scoresChannel = supabase
    .channel('scores-changes')
    .on(
      'postgres_changes',
      { event: '*', schema: 'public', table: 'scores' },
      () => {
        fetchScores();
      }
    )
    .subscribe();
}

// --- Parse Wordle paste ---
function parseWordle(text) {
  const trimmed = text.trim();
  if (!trimmed) return null;

  const headerMatch = trimmed.match(/Wordle\s+([\d,]+)\s+(\d+|X)\/6/i);
  if (!headerMatch) return null;

  const puzzleNum = headerMatch[1].replace(/,/g, '');
  const score = headerMatch[2] === 'X' ? 'X' : parseInt(headerMatch[2], 10);

  return { puzzleNum, score };
}

document.getElementById('submit-text').addEventListener('input', function() {
  const r = parseWordle(this.value);
  const el = document.getElementById('parse-preview');
  if (r) {
    el.textContent = r.score === 'X'
      ? `Wordle #${r.puzzleNum} · Score: X (failed)`
      : `Wordle #${r.puzzleNum} · Score: ${r.score}/6`;
    el.style.color = 'var(--green)';
  } else if (this.value.trim()) {
    el.textContent = 'Could not parse — make sure you paste the full Wordle share text';
    el.style.color = '#e67e22';
  } else {
    el.textContent = '';
  }
});

// --- Submit ---
function submitScore() {
  const player = document.getElementById('submit-player').value;
  const text = document.getElementById('submit-text').value;
  if (!player) { showToast('Please select your name'); return; }
  const parsed = parseWordle(text);
  if (!parsed) { showToast('Could not parse Wordle result'); return; }

  const data = loadData();
  // Prevent duplicate puzzle+player
  if (data.find(e => e.player === player && e.puzzleNum === parsed.puzzleNum)) {
    showToast(`${player} already submitted Wordle #${parsed.puzzleNum}`);
    return;
  }

  const entry = {
    id: Date.now(),
    player,
    puzzleNum: parsed.puzzleNum,
    score: parsed.score,
    date: new Date().toISOString(),
    month: new Date().getMonth(),
    year: new Date().getFullYear()
  };

  supabase.from('scores').insert([entry]).then(() => {
    fetchScores();
  });
  document.getElementById('submit-text').value = '';
  document.getElementById('submit-player').value = '';
  document.getElementById('parse-preview').textContent = '';
  showToast(`Score submitted! ${player}: ${parsed.score}/6`);
}

// --- Render leaderboard ---
function renderLeaderboard() {
  const data = loadData();
  const monthData = data.filter(e => e.month === currentMonth && e.year === new Date().getFullYear());

  document.getElementById('month-label').textContent = FULL_MONTHS[currentMonth].toUpperCase();

  // Per-player stats for current month
  const stats = PLAYERS.map(p => {
    const entries = monthData.filter(e => e.player === p);
    const scores = entries.map(e => e.score === 'X' ? 7 : e.score);
    const avg = scores.length ? scores.reduce((a,b)=>a+b,0)/scores.length : null;
    return { player: p, count: entries.length, avg, scores };
  });

  // Sort: by avg (lower better), then count (more games = tiebreak)
  stats.sort((a,b) => {
    if (a.avg === null && b.avg === null) return 0;
    if (a.avg === null) return 1;
    if (b.avg === null) return -1;
    if (Math.abs(a.avg - b.avg) > 0.001) return a.avg - b.avg;
    return b.count - a.count;
  });

  const maxCount = Math.max(...stats.map(s => s.count), 1);

  const lb = document.getElementById('leaderboard');
  lb.innerHTML = '';

  stats.forEach((s, i) => {
    const isLeader = i === 0 && s.avg !== null;
    const row = document.createElement('div');
    row.className = 'player-row' + (isLeader ? ' leader' : '');

    const rankLabel = i === 0 && s.avg !== null ? '<span class="rank gold">1</span>' : `<span class="rank">${i+1}</span>`;
    const crown = isLeader ? '<span class="crown">👑</span>' : '';
    const avgDisplay = s.avg !== null ? s.avg.toFixed(2) : '—';
    const avgClass = s.avg !== null && s.avg <= 3.5 ? 'stat-val good' : 'stat-val';
    const barWidth = s.count ? Math.round((s.count / maxCount) * 100) : 0;

    row.innerHTML = `
      ${rankLabel}
      <div class="player-name">${crown}${s.player}</div>
      <div class="stat-col">
        <div class="${avgClass}">${avgDisplay}</div>
        <div class="stat-label">avg</div>
      </div>
      <div class="stat-col">
        <div class="stat-val">${s.count}</div>
        <div class="stat-label">games</div>
      </div>
      <div class="stat-col">
        <div class="stat-val">${getMonthPoints(s.player)}</div>
        <div class="stat-label">total pts</div>
      </div>
      <div class="score-bar-wrap">
        <div class="score-bar"><div class="score-bar-fill" style="width:${barWidth}%"></div></div>
      </div>
    `;
    lb.appendChild(row);
  });
}

// --- Monthly points: award 1 pt per past month winner ---
function computeMonthlyPoints() {
  const data = loadData();
  const now = new Date();
  const pts = {};
  PLAYERS.forEach(p => pts[p] = 0);

  for (let m = 0; m < now.getMonth(); m++) {
    const monthData = data.filter(e => e.month === m && e.year === now.getFullYear());
    if (!monthData.length) continue;
    const stats = PLAYERS.map(p => {
      const entries = monthData.filter(e => e.player === p);
      const scores = entries.map(e => e.score === 'X' ? 7 : e.score);
      const avg = scores.length ? scores.reduce((a,b)=>a+b,0)/scores.length : null;
      return { player: p, avg, count: entries.length };
    }).filter(s => s.avg !== null);
    if (!stats.length) continue;
    stats.sort((a,b) => a.avg !== b.avg ? a.avg - b.avg : b.count - a.count);
    pts[stats[0].player]++;
  }
  return pts;
}

function getMonthPoints(player) {
  return computeMonthlyPoints()[player] || 0;
}

function renderPrizeSection() {
  const pts = computeMonthlyPoints();
  const totalPrize = 100;
  document.getElementById('prize-amount').textContent = `$${totalPrize}`;

  const maxPts = Math.max(...Object.values(pts));
  const grid = document.getElementById('points-grid');
  grid.innerHTML = PLAYERS.map(p => {
    const isLeading = pts[p] === maxPts && maxPts > 0;
    return `<div class="points-chip">
      <div class="p-name">${p}</div>
      <div class="p-pts${isLeading ? ' leading' : ''}">${pts[p]}</div>
    </div>`;
  }).join('');
}

// --- History ---
function renderHistory() {
  const data = loadData();
  const filtered = historyFilter === 'ALL' ? data : data.filter(e => e.player === historyFilter);
  const sorted = [...filtered].sort((a,b) => b.id - a.id);

  const list = document.getElementById('history-list');
  if (!sorted.length) {
    list.innerHTML = '<div style="color:var(--text3);font-family:var(--mono);font-size:13px;padding:1rem 0">No scores yet.</div>';
    return;
  }

  list.innerHTML = sorted.map(e => {
    const d = new Date(e.date);
    const dateStr = `${MONTHS[d.getMonth()]} ${d.getDate()}`;
    const scoreClass = e.score === 'X' ? 'score-X' : `score-${e.score}`;
    const scoreDisp = e.score === 'X' ? 'X/6' : `${e.score}/6`;
    return `<div class="history-item">
      <div class="history-meta">
        <span class="history-player">${e.player}</span>
        <span class="history-wordle">#${e.puzzleNum}</span>
        <span class="history-date">${dateStr}</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="history-score ${scoreClass}">${scoreDisp}</span>
        <button class="delete-btn" onclick="deleteEntry(${e.id})" title="Delete">✕</button>
      </div>
    </div>`;
  }).join('');
}

function deleteEntry(id) {
  supabase.from('scores').delete().eq('id', id).then(() => {
    fetchScores();
    showToast('Entry removed');
  });
}

function filterHistory(player, btn) {
  historyFilter = player;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderHistory();
}

// --- Month nav ---
function changeMonth(dir) {
  const now = new Date();
  currentMonth = Math.max(0, Math.min(11, currentMonth + dir));
  renderLeaderboard();
}

// --- Tabs ---
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'history') renderHistory();
}

// --- Toast ---
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// --- Header date ---
function setHeaderDate() {
  const now = new Date();
  const opts = { weekday: 'short', month: 'short', day: 'numeric' };
  document.getElementById('header-date').textContent =
    now.toLocaleDateString('en-US', opts).toUpperCase() + '\n' + FULL_MONTHS[now.getMonth()].toUpperCase() + ' STANDINGS';
}

function renderAll() {
  renderLeaderboard();
  renderPrizeSection();
  renderHistory();
}

setHeaderDate();
fetchScores();
subscribeToScores();
window.addEventListener('focus', fetchScores);
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) fetchScores();
});
</script>
</body>
</html>
