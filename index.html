<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Wordle Tracker</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --green: #538d4e;
      --yellow: #b59f3b;
      --gray: #3a3a3c;
      --bg: #121213;
      --surface: #1a1a1b;
      --surface2: #242424;
      --border: #2e2e30;
      --text: #ffffff;
      --text2: #818384;
      --text3: #565758;
      --mono: 'Space Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 0 0 4rem;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .logo {
      font-family: var(--mono);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-tiles {
      display: flex;
      gap: 3px;
    }

    .logo-tile {
      width: 14px;
      height: 14px;
      border-radius: 2px;
    }

    .tile-g {
      background: var(--green);
    }

    .tile-y {
      background: var(--yellow);
    }

    .tile-x {
      background: var(--gray);
    }

    .header-right {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text2);
      text-align: right;
      line-height: 1.5;
      white-space: pre;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .admin-badge {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--green);
      border: 1px solid var(--green);
      border-radius: 4px;
      padding: 3px 8px;
      letter-spacing: 0.06em;
      display: none;
    }

    .admin-badge.visible {
      display: inline-block;
    }

    .logout-btn {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text3);
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      cursor: pointer;
      letter-spacing: 0.06em;
      display: none;
      transition: color 0.1s, border-color 0.1s;
    }

    .logout-btn.visible {
      display: inline-block;
    }

    .logout-btn:hover {
      color: #e74c3c;
      border-color: #e74c3c;
    }

    .main {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.5rem 0;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }

    .tab {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.06em;
      padding: 10px 18px;
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab.active {
      color: var(--green);
      border-bottom-color: var(--green);
    }

    .tab:hover:not(.active) {
      color: var(--text2);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .month-label {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--text);
    }

    .month-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      font-family: var(--mono);
      font-size: 14px;
      width: 32px;
      height: 32px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, color 0.1s;
    }

    .month-btn:hover {
      background: var(--border);
      color: var(--text);
    }

    .leaderboard {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 2rem;
    }

    .player-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      display: grid;
      grid-template-columns: 28px 1fr 70px 70px 70px 70px;
      align-items: center;
      gap: 8px;
      transition: border-color 0.15s;
    }

    .player-row.no-season-pts {
      grid-template-columns: 28px 1fr 70px 70px 70px;
    }

    .player-row:hover {
      border-color: var(--text3);
    }

    .player-row.leader {
      border-color: var(--green);
    }

    .player-row.silver {
      border-color: #aaa;
    }

    .player-row.bronze {
      border-color: #cd7f32;
    }

    .rank {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text3);
      text-align: center;
    }

    .rank.gold {
      color: #f5c518;
    }

    .rank.silver {
      color: #aaaaaa;
    }

    .rank.bronze {
      color: #cd7f32;
    }

    .player-name {
      font-weight: 600;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .medal {
      font-size: 14px;
    }

    .stat-col {
      text-align: right;
    }

    .stat-val {
      font-family: var(--mono);
      font-size: 15px;
      color: var(--text);
    }

    .stat-val.good {
      color: var(--green);
    }

    .stat-val.best {
      color: var(--yellow);
    }

    .stat-label {
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .score-bar-wrap {
      margin-top: 6px;
      grid-column: 2 / -1;
    }

    .score-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .score-bar-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--green);
      transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Submit */
    .submit-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .submit-title {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text2);
      margin-bottom: 1.25rem;
    }

    .form-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 130px;
    }

    label {
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-family: var(--mono);
    }

    select,
    textarea,
    input[type="email"],
    input[type="password"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    select:focus,
    textarea:focus,
    input:focus {
      border-color: var(--green);
    }

    textarea {
      resize: vertical;
      min-height: 90px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.6;
    }

    .submit-btn {
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 24px;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .submit-btn:hover {
      opacity: 0.88;
    }

    .submit-btn:active {
      transform: scale(0.98);
    }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--green);
      color: #fff;
      font-family: var(--mono);
      font-size: 13px;
      padding: 10px 20px;
      border-radius: 6px;
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 100;
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* Today's scores */
    .today-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .today-title {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text2);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .today-wordle-num {
      color: var(--text3);
      font-size: 11px;
    }

    .today-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .today-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: var(--surface2);
      border-radius: 6px;
      border: 1px solid var(--border);
      gap: 10px;
    }

    .today-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .today-player {
      font-weight: 600;
      font-size: 14px;
    }

    .today-reaction {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .reaction-kablooie {
      color: var(--green);
      animation: pop 0.4s ease;
    }

    .reaction-boom {
      font-size: 18px;
    }

    .reaction-rip {
      color: #e74c3c;
    }

    @keyframes pop {
      0% {
        transform: scale(0.8);
        opacity: 0;
      }

      60% {
        transform: scale(1.15);
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .today-score-display {
      font-family: var(--mono);
      font-size: 16px;
      font-weight: 700;
    }

    .today-gif {
      width: 100%;
      max-height: 160px;
      object-fit: cover;
      border-radius: 6px;
      margin-top: 8px;
      display: block;
    }

    .today-gif-wrap {
      grid-column: 1 / -1;
    }

    .today-empty {
      color: var(--text3);
      font-family: var(--mono);
      font-size: 12px;
      padding: 0.5rem 0;
    }

    /* History */
    .history-filters {
      display: flex;
      gap: 8px;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: all 0.1s;
    }

    .filter-btn.active {
      background: var(--surface2);
      border-color: var(--text3);
      color: var(--text);
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .history-meta {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .history-player {
      font-weight: 600;
      font-size: 14px;
    }

    .history-date {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text3);
    }

    .history-wordle {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text2);
    }

    .history-score {
      font-family: var(--mono);
      font-size: 16px;
      font-weight: 700;
    }

    .score-1,
    .score-2 {
      color: var(--green);
    }

    .score-3,
    .score-4 {
      color: #8bc34a;
    }

    .score-5 {
      color: var(--yellow);
    }

    .score-6 {
      color: #e67e22;
    }

    .score-X {
      color: #e74c3c;
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 4px;
      border-radius: 3px;
      transition: color 0.1s, background 0.1s;
    }

    .delete-btn:hover {
      color: #e74c3c;
      background: rgba(231, 76, 60, 0.1);
    }

    /* Prize */
    .prize-banner {
      background: linear-gradient(135deg, #1a2e1a 0%, #1a1a1b 100%);
      border: 1px solid var(--green);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .prize-title {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--green);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .prize-amount {
      font-size: 24px;
      font-weight: 700;
    }

    .prize-sub {
      font-size: 12px;
      color: var(--text2);
      margin-top: 2px;
    }

    .points-grid {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .points-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 14px;
      text-align: center;
    }

    .points-chip .p-name {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 2px;
    }

    .points-chip .p-pts {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .points-chip .p-pts.leading {
      color: var(--green);
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.visible {
      display: flex;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 360px;
      margin: 1rem;
    }

    .modal-title {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text2);
      margin-bottom: 1.25rem;
    }

    .modal-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 1rem;
    }

    .cancel-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: 6px;
      padding: 10px 18px;
      font-family: var(--mono);
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.1s, color 0.1s;
    }

    .cancel-btn:hover {
      border-color: var(--text2);
      color: var(--text);
    }

    .login-error {
      font-family: var(--mono);
      font-size: 12px;
      color: #e74c3c;
      margin-top: 8px;
      min-height: 18px;
    }

    @media (max-width: 540px) {
      .player-row {
        grid-template-columns: 24px 1fr 55px 55px 55px 55px;
        gap: 4px;
      }

      .player-row.no-season-pts {
        grid-template-columns: 24px 1fr 55px 55px 55px;
      }
    .stat-val { font-size: 12px; }
    .score-bar-wrap { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-tiles">
      <div class="logo-tile tile-x"></div>
      <div class="logo-tile tile-g"></div>
      <div class="logo-tile tile-y"></div>
      <div class="logo-tile tile-g"></div>
      <div class="logo-tile tile-g"></div>
    </div>
    FAMILY WORDLE
  </div>
  <div class="header-right">
    <span id="admin-badge" class="admin-badge">ADMIN</span>
    <button id="logout-btn" class="logout-btn" onclick="adminLogout()">LOGOUT</button>
    <span id="header-date"></span>
  </div>
</header>

<div class="modal-overlay" id="admin-modal">
  <div class="modal">
    <div class="modal-title">Admin Login</div>
    <div class="modal-group">
      <label>Email</label>
      <input type="email" id="admin-email" placeholder="your@email.com" />
    </div>
    <div class="modal-group">
      <label>Password</label>
      <input type="password" id="admin-password" placeholder="••••••••" />
    </div>
    <div class="login-error" id="login-error"></div>
    <div class="modal-actions">
      <button class="submit-btn" onclick="adminLogin()">LOGIN</button>
      <button class="cancel-btn" onclick="closeAdminModal()">CANCEL</button>
    </div>
  </div>
</div>

<div class="main">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('leaderboard', this)">LEADERBOARD</button>
    <button class="tab" onclick="switchTab('submit', this)">SUBMIT SCORE</button>
    <button class="tab" onclick="switchTab('history', this)">HISTORY</button>
  </div>

  <!-- LEADERBOARD -->
  <div id="tab-leaderboard" class="tab-content active">
    <div class="prize-banner">
      <div class="prize-left">
        <div class="prize-title">Grand Prize</div>
        <div class="prize-amount">$100</div>
        <div class="prize-sub">Lowest avg score wins each month · most points by Dec wins all</div>
      </div>
      <div class="points-grid" id="points-grid"></div>
    </div>
    <div class="month-nav">
      <button class="month-btn" onclick="changeMonth(-1)">&#8592;</button>
      <div class="month-label" id="month-label"></div>
      <button class="month-btn" onclick="changeMonth(1)">&#8594;</button>
    </div>
    <div class="leaderboard" id="leaderboard"></div>
  </div>

  <!-- SUBMIT -->
  <div id="tab-submit" class="tab-content">

    <div class="today-card">
      <div class="today-title">
        <span>TODAY'S SCORES</span>
        <span class="today-wordle-num" id="today-wordle-num"></span>
      </div>
      <div class="today-list" id="today-list">
        <div class="today-empty">No scores yet today.</div>
      </div>
    </div>

    <div class="submit-card">
      <div class="submit-title">Post Your Score</div>
      <div class="form-row">
        <div class="form-group">
          <label>Your Name</label>
          <select id="submit-player">
            <option value="">Select...</option>
            <option>Jeff</option><option>Tristan</option><option>Nana</option><option>Daniel</option><option>Caleb</option>
          </select>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label>Paste Your Wordle Result</label>
        <textarea id="submit-text" placeholder="Wordle 1,747 4/6&#10;⬜⬜⬜⬜⬜&#10;🟩⬜⬜⬜⬜&#10;🟩⬜⬜⬜🟩&#10;🟩🟩🟩🟩🟩"></textarea>
      </div>
      <div id="parse-preview" style="margin-bottom:14px; font-family: var(--mono); font-size:13px; color: var(--green); min-height:20px;"></div>
      <button class="submit-btn" onclick="submitScore()">SUBMIT ↗</button>
    </div>
  </div>

  <!-- HISTORY -->
  <div id="tab-history" class="tab-content">
    <div class="history-filters">
      <button class="filter-btn active" onclick="filterHistory('ALL', this)">ALL</button>
      <button class="filter-btn" onclick="filterHistory('Jeff', this)">Jeff</button>
      <button class="filter-btn" onclick="filterHistory('Tristan', this)">Tristan</button>
      <button class="filter-btn" onclick="filterHistory('Nana', this)">Nana</button>
      <button class="filter-btn" onclick="filterHistory('Daniel', this)">Daniel</button>
      <button class="filter-btn" onclick="filterHistory('Caleb', this)">Caleb</button>
    </div>
    <div class="history-list" id="history-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>

// --- Data ---
function loadData() { return allScores; }

async function fetchScores() {
  const { data, error } = await supabase
    .from('scores')
    .select('*')
    .order('id', { ascending: false });
  if (!error) {
    allScores = data || [];
    renderAll();
  }
}

function subscribeToScores() {
  if (scoresChannel) return;
  scoresChannel = supabase
    .channel('scores-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'scores' }, () => fetchScores())
    .subscribe();
}

// --- Parse ---
function parseWordle(text) {
  const trimmed = text.trim();
  if (!trimmed) return null;
  const headerMatch = trimmed.match(/Wordle\s+([\d,]+)\s+(\d+|X)\/6/i);
  if (!headerMatch) return null;
  const puzzleNum = headerMatch[1].replace(/,/g, '');
  const score = headerMatch[2] === 'X' ? 'X' : parseInt(headerMatch[2], 10);
  return { puzzleNum, score };
}

document.getElementById('submit-text').addEventListener('input', function() {
  const r = parseWordle(this.value);
  const el = document.getElementById('parse-preview');
  if (r) {
    el.textContent = r.score === 'X'
      ? `Wordle #${r.puzzleNum} · Score: X (failed)`
      : `Wordle #${r.puzzleNum} · Score: ${r.score}/6`;
    el.style.color = 'var(--green)';
  } else if (this.value.trim()) {
    el.textContent = 'Could not parse — make sure you paste the full Wordle share text';
    el.style.color = '#e67e22';
  } else {
    el.textContent = '';
  }
});

// --- Submit ---
function submitScore() {
  const player = document.getElementById('submit-player').value;
  const text = document.getElementById('submit-text').value;
  if (!player) { showToast('Please select your name'); return; }
  const parsed = parseWordle(text);
  if (!parsed) { showToast('Could not parse Wordle result'); return; }

  const data = loadData();
  if (data.find(e => e.player === player && e.puzzleNum === parsed.puzzleNum)) {
    showToast(`${player} already submitted Wordle #${parsed.puzzleNum}`);
    return;
  }

  const entry = {
    id: Date.now(),
    player,
    puzzleNum: parsed.puzzleNum,
    score: parsed.score,
    date: new Date().toISOString(),
    month: new Date().getMonth(),
    year: new Date().getFullYear()
  };

  supabase.from('scores').insert([entry]).then(() => fetchScores());
  document.getElementById('submit-text').value = '';
  document.getElementById('submit-player').value = '';
  document.getElementById('parse-preview').textContent = '';
  showToast(`Score submitted! ${player}: ${parsed.score}/6`);
}

// --- Today's scores ---
function getTodaysPuzzleNum() {
  const data = loadData();
  const today = new Date();
  const todayScores = data.filter(e => {
    const d = new Date(e.date);
    return d.getFullYear() === today.getFullYear() &&
           d.getMonth() === today.getMonth() &&
           d.getDate() === today.getDate();
  });
  if (todayScores.length) return todayScores[0].puzzleNum;
  return null;
}

function renderTodayScores() {
  const data = loadData();
  const today = new Date();
  const todayScores = data.filter(e => {
    const d = new Date(e.date);
    return d.getFullYear() === today.getFullYear() &&
           d.getMonth() === today.getMonth() &&
           d.getDate() === today.getDate();
  }).sort((a, b) => {
    const sa = a.score === 'X' ? 7 : parseInt(a.score, 10);
    const sb = b.score === 'X' ? 7 : parseInt(b.score, 10);
    return sa - sb;
  });

  const puzzleNum = getTodaysPuzzleNum();
  const numEl = document.getElementById('today-wordle-num');
  numEl.textContent = puzzleNum ? `#${puzzleNum}` : '';

  const list = document.getElementById('today-list');

  if (!todayScores.length) {
    list.innerHTML = '<div class="today-empty">No scores yet today.</div>';
    return;
  }

  list.innerHTML = todayScores.map(e => {
    const scoreNum = e.score === 'X' ? 'X' : parseInt(e.score, 10);
    const scoreClass = e.score === 'X' ? 'score-X' : `score-${e.score}`;
    const scoreDisp = e.score === 'X' ? 'X/6' : `${e.score}/6`;
    const reaction = getReaction(scoreNum);

    let reactionHTML = '';
    if (reaction) {
      if (reaction.gif) {
        reactionHTML = `<img src="${reaction.gif}" class="today-gif" alt="reaction" />`;
      } else {
        reactionHTML = `<span class="today-reaction ${reaction.cls}">${reaction.text}</span>`;
      }
    }

    return `<div style="display:flex;flex-direction:column;gap:0">
      <div class="today-item">
        <div class="today-left">
          <span class="today-player">${e.player}</span>
          ${reactionHTML && !reaction.gif ? reactionHTML : ''}
        </div>
        <span class="today-score-display ${scoreClass}">${scoreDisp}</span>
      </div>
      ${reaction && reaction.gif ? `<img src="${reaction.gif}" class="today-gif" alt="oof" />` : ''}
    </div>`;
  }).join('');
}

// --- Monthly points ---
function computeMonthlyPoints() {
  const data = loadData();
  const now = new Date();
  const pts = {};
  PLAYERS.forEach(p => pts[p] = 0);

  for (let m = 0; m < now.getMonth(); m++) {
    const monthData = data.filter(e => e.month === m && e.year === now.getFullYear());
    if (!monthData.length) continue;
    const stats = PLAYERS.map(p => {
      const entries = monthData.filter(e => e.player === p);
      const scores = entries.map(e => e.score === 'X' ? 7 : parseInt(e.score, 10));
      const avg = scores.length ? scores.reduce((a,b)=>a+b,0)/scores.length : null;
      return { player: p, avg, count: entries.length };
    }).filter(s => s.avg !== null);
    if (!stats.length) continue;
    stats.sort((a,b) => a.avg !== b.avg ? a.avg - b.avg : b.count - a.count);
    pts[stats[0].player]++;
  }
  return pts;
}

function getMonthPoints(player) { return computeMonthlyPoints()[player] || 0; }

function hasSeasonPoints() {
  return new Date().getMonth() > 0 && Object.values(computeMonthlyPoints()).some(v => v > 0);
}

// --- Leaderboard ---
function renderLeaderboard() {
  const data = loadData();
  const monthData = data.filter(e => e.month === currentMonth && e.year === new Date().getFullYear());
  document.getElementById('month-label').textContent = FULL_MONTHS[currentMonth].toUpperCase();

  const showSeasonPts = hasSeasonPoints();

  const stats = PLAYERS.map(p => {
    const entries = monthData.filter(e => e.player === p);
    const scores = entries.map(e => e.score === 'X' ? 7 : parseInt(e.score, 10));
    const avg = scores.length ? scores.reduce((a,b)=>a+b,0)/scores.length : null;
    const total = scores.length ? scores.reduce((a,b)=>a+b,0) : null;
    return { player: p, count: entries.length, avg, total };;
  });

  stats.sort((a,b) => {
    if (a.avg === null && b.avg === null) return 0;
    if (a.avg === null) return 1;
    if (b.avg === null) return -1;
    if (Math.abs(a.avg - b.avg) > 0.001) return a.avg - b.avg;
    return b.count - a.count;
  });

  const maxCount = Math.max(...stats.map(s => s.count), 1);
  const lb = document.getElementById('leaderboard');
  lb.innerHTML = '';

  stats.forEach((s, i) => {
    const isLeader = i === 0 && s.avg !== null;
    const isSilver = i === 1 && s.avg !== null;
    const isBronze = i === 2 && s.avg !== null;

    const row = document.createElement('div');
    let rowClass = 'player-row';
    if (isLeader) rowClass += ' leader';
    else if (isSilver) rowClass += ' silver';
    else if (isBronze) rowClass += ' bronze';
    if (!showSeasonPts) rowClass += ' no-season-pts';
    row.className = rowClass;

    let rankLabel, medal;
    if (isLeader)      { rankLabel = '<span class="rank gold">1</span>';   medal = '<span class="medal">👑</span>'; }
    else if (isSilver) { rankLabel = '<span class="rank silver">2</span>'; medal = '<span class="medal">🥈</span>'; }
    else if (isBronze) { rankLabel = '<span class="rank bronze">3</span>'; medal = '<span class="medal">🥉</span>'; }
    else               { rankLabel = `<span class="rank">${i+1}</span>`;   medal = ''; }

    const avgDisplay = s.avg !== null ? s.avg.toFixed(2) : '—';
    const avgClass = s.avg !== null && s.avg <= 3.5 ? 'stat-val good' : 'stat-val';
    const totalDisplay = s.total !== null ? s.total : '—';
    const barWidth = s.count ? Math.round((s.count / maxCount) * 100) : 0;

    const seasonPtsCol = showSeasonPts ? `
      <div class="stat-col">
        <div class="stat-val">${getMonthPoints(s.player)}</div>
        <div class="stat-label">season pts</div>
      </div>` : '';

    row.innerHTML = `
      ${rankLabel}
      <div class="player-name">${medal}${s.player}</div>
      <div class="stat-col">
        <div class="${avgClass}">${avgDisplay}</div>
        <div class="stat-label">avg</div>
      </div>
      <div class="stat-col">
        <div class="stat-val">${totalDisplay}</div>
        <div class="stat-label">total</div>
      </div>
      <div class="stat-col">
        <div class="stat-val">${s.count}</div>
        <div class="stat-label">games</div>
      </div>
      ${seasonPtsCol}
      <div class="score-bar-wrap">
        <div class="score-bar"><div class="score-bar-fill" style="width:${barWidth}%"></div></div>
      </div>
    `;
    lb.appendChild(row);
  });
}

// --- Prize section ---
function renderPrizeSection() {
  const pts = computeMonthlyPoints();
  const maxPts = Math.max(...Object.values(pts));
  const grid = document.getElementById('points-grid');
  grid.innerHTML = PLAYERS.map(p => {
    const isLeading = pts[p] === maxPts && maxPts > 0;
    return `<div class="points-chip">
      <div class="p-name">${p}</div>
      <div class="p-pts${isLeading ? ' leading' : ''}">${pts[p]}</div>
    </div>`;
  }).join('');
}

// --- History ---
function renderHistory() {
  const data = loadData();
  const filtered = historyFilter === 'ALL' ? data : data.filter(e => e.player === historyFilter);
  const sorted = [...filtered].sort((a,b) => b.id - a.id);

  const list = document.getElementById('history-list');
  if (!sorted.length) {
    list.innerHTML = '<div style="color:var(--text3);font-family:var(--mono);font-size:13px;padding:1rem 0">No scores yet.</div>';
    return;
  }

  list.innerHTML = sorted.map(e => {
    const d = new Date(e.date);
    const dateStr = `${MONTHS[d.getMonth()]} ${d.getDate()}`;
    const scoreClass = e.score === 'X' ? 'score-X' : `score-${e.score}`;
    const scoreDisp = e.score === 'X' ? 'X/6' : `${e.score}/6`;
    const deleteBtn = isAdmin
      ? `<button class="delete-btn" onclick="deleteEntry(${e.id})" title="Delete">✕</button>`
      : '';
    return `<div class="history-item">
      <div class="history-meta">
        <span class="history-player">${e.player}</span>
        <span class="history-wordle">#${e.puzzleNum}</span>
        <span class="history-date">${dateStr}</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="history-score ${scoreClass}">${scoreDisp}</span>
        ${deleteBtn}
      </div>
    </div>`;
  }).join('');
}

function deleteEntry(id) {
  supabase.from('scores').delete().eq('id', id).then(({ error }) => {
    if (error) { showToast('Delete failed — are you logged in?'); return; }
    fetchScores();
    showToast('Entry removed');
  });
}

function changeMonth(dir) {
  currentMonth = Math.max(0, Math.min(11, currentMonth + dir));

  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');

  if (name === 'submit') renderTodayScores();

  renderLeaderboard();
